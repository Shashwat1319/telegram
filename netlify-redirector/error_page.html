<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oops! Something went wrong</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #333;
    }
    .card {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      padding: 1.5rem;
      margin: 1rem 0;
      width: 100%;
      max-width: 480px;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
      color: #d9534f;
    }
    p { margin-bottom: 1rem; }
    .link-btn {
      display: block;
      margin: 0.6rem auto;
      padding: 0.8rem 1.2rem;
      width: 90%;
      max-width: 300px;
      background: #28a745;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      transition: transform 0.2s, background 0.2s;
    }
    .link-btn:hover {
      background: #218838;
      transform: translateY(-2px);
    }
    .footer { margin-top: 2rem; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Oops! Something went wrong 😅</h1>
    <p>Looks like the product link didn't work. But don't miss out – check these awesome deals!</p>
    <a class="link-btn" href="https://amzn.to/4r5AZ6G" target="_blank">Vegetable Chopper</a>
    <a class="link-btn" href="https://amzn.to/3Nt40KP" target="_blank">Dish Drying Rack</a>
    <a class="link-btn" href="https://amzn.to/4sOhjps" target="_blank">Spice Organizer</a>
    <a class="link-btn" href="https://amzn.to/4jJGs0i" target="_blank">Oil Dispenser</a>
    <a class="link-btn" href="https://amzn.to/4jQ8SWH" target="_blank">Sink Organizer</a>
  </div>
  <div class="footer">Your budget‑deals bot – always hunting the best discounts.</div>
</body>
</html>
