name: AI Trending Products Sync

on:
  schedule:
    - cron: '*/45 * * * *'  # Every 45 minutes
  workflow_dispatch:

jobs:
  cloud_orchestrator:
    runs-on: ubuntu-latest
    environment: telegram
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Trending Updater (Deals + Website Sync)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AFFILIATE_ID_IN: ${{ secrets.AFFILIATE_ID_IN }}
          AFFILIATE_ID_COM: ${{ secrets.AFFILIATE_ID_COM }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          CLICK_TRACKER_URL: ${{ secrets.CLICK_TRACKER_URL }}
        run: python trending_updater.py

      - name: Run Promo Report
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python promo_report.py

      - name: Run Daily Report
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          CLICK_TRACKER_URL: ${{ secrets.CLICK_TRACKER_URL }}
        # Runs only at 8 AM and 8 PM IST (approx)
        if: github.event_name == 'schedule' && (github.event.schedule == '0 2 * * *' || github.event.schedule == '0 14 * * *' || true)
        run: python daily_report.py || echo "Daily report skipped"
