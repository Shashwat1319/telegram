name: AI Trending Products Sync

on:
  # schedule:
  #   - cron: '0 4,6,8,10,12,14,16,18 * * *'  # Disabled to keep product.json static
  workflow_dispatch:

jobs:
  cloud_orchestrator:
    runs-on: ubuntu-latest
    environment: telegram
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Trending Updater (Deals + Website Sync)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AFFILIATE_ID_IN: ${{ secrets.AFFILIATE_ID_IN }}
          AFFILIATE_ID_COM: ${{ secrets.AFFILIATE_ID_COM }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          CLICK_TRACKER_URL: ${{ secrets.CLICK_TRACKER_URL }}
        run: |
          python trending_updater.py
          git add .
          git commit -m "Auto-sync May Sprint: New Budget Deals & Trackers" || echo "No changes to commit"
          git pull --rebase origin main || (git rebase --abort && git pull --no-rebase origin main -X theirs)
          git push origin main || echo "Push failed"

      - name: Run Promo Report
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python promo_report.py

      - name: Run YouTube Auto Shorts Uploader
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        if: ${{ env.YOUTUBE_CLIENT_SECRETS != '' && env.YOUTUBE_TOKEN != '' }}
        run: python youtube_auto_upload.py || echo "YouTube upload skipped or failed"

      - name: Run Daily Report
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          CLICK_TRACKER_URL: ${{ secrets.CLICK_TRACKER_URL }}
        if: github.event_name == 'schedule' && (github.event.schedule == '0 2 * * *' || github.event.schedule == '0 14 * * *' || true)
        run: python daily_report.py || echo "Daily report skipped"

      - name: Run auto blogger (generate blog posts & deal pages)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLICK_TRACKER_URL: ${{ secrets.CLICK_TRACKER_URL }}
        run: |
          python auto_blogger.py

      - name: Set up Node.js for Astro build
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agency-portfolio/package-lock.json

      - name: Install Astro dependencies
        run: |
          cd agency-portfolio
          npm ci

      - name: Build Astro website
        run: |
          cd agency-portfolio
          npm run build

      - name: Deploy to Netlify
        if: env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        uses: nwtgck/actions-netlify@v2.1
        with:
          publish-dir: './agency-portfolio/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from Trending Updater - ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Commit generated content (blog posts, deal pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agency-portfolio/src/content/blog/ agency-portfolio/src/content/deals/
          git commit -m "Auto-generate blog posts & deal pages [skip ci]" || echo "No new content to commit"
          git push origin main || echo "Push failed"