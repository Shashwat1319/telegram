name: Daily Deal Posting & Deploy

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  content-cycle:
    runs-on: ubuntu-latest
    environment: telegram
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync Trending Products
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AFFILIATE_ID_IN: ${{ secrets.AFFILIATE_ID_IN }}
        run: python trending_updater.py

      - name: Post Deals to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CLICK_TRACKER_URL: ${{ secrets.CLICK_TRACKER_URL }}
          AFFILIATE_ID_IN: ${{ secrets.AFFILIATE_ID_IN }}
        run: python bot_post.py --dry-run

      - name: Generate Blogs & Deal Pages
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python auto_blogger.py

      - name: Daily Report
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          CLICK_TRACKER_URL: ${{ secrets.CLICK_TRACKER_URL }}
        run: python daily_report.py || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Build Astro Website
        run: |
          cd website
          npm ci
          npm run build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.1
        with:
          publish-dir: './website/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Auto-deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Commit generated content
        run: |
          git pull --rebase origin main || true
          git add website/src/content/blog/ website/src/content/deals/ product.json
          git commit -m "Auto-update: deals & content [skip ci]" || echo "No changes"
          git push origin main || echo "Push failed"
