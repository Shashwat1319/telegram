# GitHub Actions workflow to run the combined poster script once per day
# Path: .github/workflows/daily_poster.yml

name: Daily Poster

on:
  schedule:
    # Runs every day at 07:00 UTC (12:30 IST). Adjust as needed.
    - cron: "0 7 * * *"
  workflow_dispatch: # Allows manual trigger

jobs:
  run-poster:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "No requirements.txt found"; fi

      - name: Run combined poster script
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CLICK_TRACKER_URL: ${{ secrets.CLICK_TRACKER_URL }}
        run: |
          python combined_poster.py
