# GitHub Actions workflow to run the combined poster script once per day
# Path: .github/workflows/daily_poster.yml

name: Daily Poster & Website Deploy

on:
  schedule:
    # Runs every day at 07:00 UTC (12:30 IST). Adjust as needed.
    - cron: "0 7 * * *"
  workflow_dispatch: # Allows manual trigger

jobs:
  run-poster:
    runs-on: ubuntu-latest
    environment: telegram
    defaults:
      run:
        working-directory: ./
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "No requirements.txt found"; fi

      - name: Post to Telegram (bot_post.py)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CLICK_TRACKER_URL: ${{ secrets.CLICK_TRACKER_URL }}
          POST_INTERVAL_MINUTES: "30"
          VIP_CHANNEL_ID: ${{ secrets.VIP_CHANNEL_ID }}
          DYNAMIC_GAP_MIN: "12"
          DYNAMIC_GAP_MAX: "24"
          AFFILIATE_ID_IN: ${{ secrets.AFFILIATE_ID_IN }}
        run: |
          python bot_post.py --dry-run

      - name: Run auto blogger (generate blog posts & deal pages)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLICK_TRACKER_URL: ${{ secrets.CLICK_TRACKER_URL }}
        run: |
          python auto_blogger.py

      - name: Set up Node.js for Astro build
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agency-portfolio/package-lock.json

      - name: Install Astro dependencies
        run: |
          cd agency-portfolio
          npm ci

      - name: Build Astro website
        run: |
          cd agency-portfolio
          npm run build

      - name: Deploy to Netlify
        if: env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        uses: nwtgck/actions-netlify@v2.1
        with:
          publish-dir: './agency-portfolio/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions - ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Commit generated content (blog posts, deal pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agency-portfolio/src/content/blog/ agency-portfolio/src/content/deals/
          git commit -m "Auto-generate blog posts & deal pages [skip ci]" || echo "No new content to commit"
          git push origin main || echo "Push failed"

