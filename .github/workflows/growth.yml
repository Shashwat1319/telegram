name: Growth Automation (Cloud)

on:
  schedule:
    # Scrape leads every 6 hours (0:00, 6:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
    # Promo DMs every 3 hours (offset by 30 min from scrape)
    - cron: '30 */3 * * *'
    # Member growth every 4 hours (offset by 1 hour)
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: growth-automation
  cancel-in-progress: true

jobs:
  scrape-leads:
    runs-on: ubuntu-latest
    environment: telegram
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scrape Active Members
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_SESSION_1: ${{ secrets.TELEGRAM_SESSION_1 }}
        run: |
          python scrape_active_members.py
          echo "SCRAPED_LEADS=$(wc -l < scraped_leads.txt)" >> $GITHUB_ENV

      - name: Commit new leads
        if: env.SCRAPED_LEADS > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add scraped_leads.txt promo_history.json
          git commit -m "Auto-update: New scraped leads [skip ci]" || echo "No changes"
          git push origin main || echo "Push failed"

  promo-dms:
    runs-on: ubuntu-latest
    environment: telegram
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run Promo DMs (Optimized)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TELEGRAM_SESSION_1: ${{ secrets.TELEGRAM_SESSION_1 }}
          TELEGRAM_SESSION_2: ${{ secrets.TELEGRAM_SESSION_2 }}
          TELEGRAM_SESSION_3: ${{ secrets.TELEGRAM_SESSION_3 }}
        run: |
          python promo_contacts_optimized.py

      - name: Commit promo history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add promo_history.json
          git commit -m "Auto-update: Promo history [skip ci]" || echo "No changes"
          git push origin main || echo "Push failed"

  member-growth:
    runs-on: ubuntu-latest
    environment: telegram
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run Member Growth
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TELEGRAM_SESSION_1: ${{ secrets.TELEGRAM_SESSION_1 }}
          GROWTH_TARGET_GROUPS: ${{ secrets.GROWTH_TARGET_GROUPS }}
        run: |
          python member_growth.py

      - name: Commit referrals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add referrals.json
          git commit -m "Auto-update: Referral links [skip ci]" || echo "No changes"
          git push origin main || echo "Push failed"

  referral-tracker:
    runs-on: ubuntu-latest
    environment: telegram
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Check Referral Joins (One-shot)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          TELEGRAM_SESSION_1: ${{ secrets.TELEGRAM_SESSION_1 }}
        run: |
          python referral_tracker.py --oneshot

      - name: Commit referral updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add referrals.json
          git commit -m "Auto-update: Referral joins [skip ci]" || echo "No changes"
          git push origin main || echo "Push failed"